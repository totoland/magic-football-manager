server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript text/javascript application/json image/svg+xml application/manifest+json;

  # .webmanifest needs the right content-type (not in nginx's default mime map).
  location ~* \.webmanifest$ {
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
  }

  # The service worker and entry HTML must always revalidate so a new build
  # actually reaches clients instead of being pinned by HTTP caching.
  location = /sw.js     { add_header Cache-Control "no-cache"; }
  location = /index.html { add_header Cache-Control "no-cache"; }
  location = /           { add_header Cache-Control "no-cache"; try_files /index.html =404; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
